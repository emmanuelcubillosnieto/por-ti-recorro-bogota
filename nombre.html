<!DOCTYPE html>
<html lang="es">
  <head>
    <title>¿Cómo te llamas?</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="starfield"></div>

    <div class="content">
      <h1>¿Cómo te llamas?</h1>

      <form id="nombreForm">
        <input
          type="text"
          id="nombreInput"
          placeholder="Escribe tu nombre"
          required
        />
        <button type="submit" class="btn">Enviar</button>
      </form>
    </div>

    <script>
      const starfield = document.getElementById("starfield");
      const numStars = 600;
      for (let i = 0; i < numStars; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        const size = Math.random() * 3 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.top = `${Math.random() * 100}vh`;
        star.style.left = `${Math.random() * 100}vw`;
        const moveDuration = 20 + Math.random() * 20;
        const blinkDuration = 1 + Math.random() * 2;
        const blinkDelay = Math.random() * 5;
        star.style.animationDuration = `${moveDuration}s, ${blinkDuration}s`;
        star.style.animationDelay = `0s, ${blinkDelay}s`;
        starfield.appendChild(star);
      }

      document
        .getElementById("nombreForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const nombre = document.getElementById("nombreInput").value;
          localStorage.setItem("nombreUsuario", nombre);
          window.location.href = "prologo.html";
        });
    </script>

<iframe src="/audioinicio.html" id="audio-frame" allow="autoplay" style="display:none;"></iframe>

<script>
  function iniciarMusica() {
    let iframe = document.getElementById('audio-frame');
    iframe.contentWindow.postMessage('playAudio', '*');
    

    document.removeEventListener('click', iniciarMusica);
  }
  document.addEventListener('click', iniciarMusica);
</script>


  </body>


</html>
